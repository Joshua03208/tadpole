name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build web
        run: pnpm --filter @tadpole/web build

  db-tests:
    name: migrations · RLS assertions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # This job runs the migrations + the RLS/security assertion harness against
      # a throwaway local Supabase stack (Docker) — fully independent of any cloud
      # project. It activates once `supabase init` has produced supabase/config.toml
      # (a one-off done when the CLI is first set up). Until then it is a no-op so
      # CI stays green.
      - name: Check for supabase/config.toml
        id: precheck
        run: |
          if [ -f supabase/config.toml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::supabase/config.toml not present yet — DB test job is a no-op until 'supabase init' is committed."
          fi

      - name: Install Supabase CLI
        if: steps.precheck.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (applies supabase/migrations + seed)
        if: steps.precheck.outputs.ready == 'true'
        run: supabase start

      - name: Run Phase 1 RLS / security assertions
        if: steps.precheck.outputs.ready == 'true'
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/phase1_assertions.sql

      - name: Stop local Supabase
        if: always() && steps.precheck.outputs.ready == 'true'
        run: supabase stop
