# Tadpole web — nginx reverse proxy in front of the pm2 Next.js process.
#
# 1. Edit server_name + the upstream port (3456) to match ecosystem.config.cjs.
# 2. Drop this in /etc/nginx/sites-available/tadpole, symlink into sites-enabled.
# 3. `sudo nginx -t && sudo systemctl reload nginx`
# 4. `sudo certbot --nginx -d tadpole.example.com` — certbot rewrites this file
#    to add the listen 443 / ssl_certificate lines and an 80->443 redirect.
#
# Security headers (CSP, X-Frame-Options, etc.) are emitted by Next.js
# (apps/web/next.config.ts) — do NOT duplicate them here or they'll conflict.

upstream tadpole_web {
    server 127.0.0.1:3456;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name tadpole.example.com;

    # Uploads go browser -> Supabase Storage directly, not through nginx, so the
    # default body size is fine. Bump only if you later proxy uploads.
    # client_max_body_size 2m;

    # Long-cache Next's immutable build assets (hashed filenames).
    location /_next/static/ {
        proxy_pass http://tadpole_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://tadpole_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
}
